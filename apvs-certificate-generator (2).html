document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ramond',serif;font-size:14px;color:#103a48;cursor:pointer\">← Prev<\u002Fbutton>\n      <div style=\"font-size:13px;color:#8a8273;min-width:72px;text-align:center\">{{ position }} of {{ total }}<\u002Fdiv>\n      <button onclick=\"{{ next }}\" style=\"flex:1;padding:10px;border:1px solid #cdc7b8;border-radius:6px;background:#fff;font-family:'EB Garamond',serif;font-size:14px;color:#103a48;cursor:pointer\">Next →<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div style=\"height:1px;background:#ddd8cc\"><\u002Fdiv>\n\n    <div style=\"display:flex;flex-direction:column;gap:10px\">\n      <button onclick=\"{{ printOne }}\" style=\"width:100%;padding:13px;border:none;border-radius:6px;background:#103a48;color:#fbfaf6;font-family:'EB Garamond',serif;font-size:15px;letter-spacing:0.3px;cursor:pointer\">Save / print this certificate<\u002Fbutton>\n      <button onclick=\"{{ printAll }}\" style=\"width:100%;padding:11px;border:1px solid #b08a44;border-radius:6px;background:transparent;color:#9a7836;font-family:'EB Garamond',serif;font-size:14px;cursor:pointer\">Print all · {{ total }} pages<\u002Fbutton>\n      <button onclick=\"{{ downloadList }}\" style=\"width:100%;padding:9px;border:1px solid #cdc7b8;border-radius:6px;background:#fff;color:#5d6b70;font-family:'EB Garamond',serif;font-size:13px;cursor:pointer\">Download name list (.txt)<\u002Fbutton>\n      <div style=\"font-size:11.5px;color:#a59c8a;line-height:1.5\">In the print dialog choose “Save as PDF” to keep a file per attendee.<\u002Fdiv>\n      <div style=\"font-size:11.5px;color:#9aaf8f;line-height:1.5\">✓ Your list is saved automatically in this browser — it’ll be here when you return.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <main class=\"stage-wrap\" style=\"flex:1;height:100vh;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:36px;background:#eceae3\">\n    <div class=\"screen-stage\" ref=\"{{ stageRef }}\" style=\"width:100%;display:flex;justify-content:center;overflow:hidden\">\n      <div class=\"screen-scaler\" ref=\"{{ scalerRef }}\" style=\"transform-origin:top center;display:flex;flex-direction:column;gap:14mm\">\n        <sc-for list=\"{{ displayList }}\" as=\"att\" hint-placeholder-count=\"1\">\n\n          <div class=\"cert-page\" style=\"width:297mm;height:210mm;flex-shrink:0;box-shadow:0 18px 50px rgba(16,58,72,0.22)\">\n            <div style=\"width:297mm;height:210mm;background:#fbfaf6;color:#103a48;position:relative;overflow:hidden;display:flex;padding:9mm\">\n              <div style=\"flex:1;border:2px solid #103a48;position:relative;display:flex;padding:3mm\">\n                <span style=\"position:absolute;width:9px;height:9px;background:#b08a44;transform:rotate(45deg);top:6px;left:6px\"><\u002Fspan>\n                <span style=\"position:absolute;width:9px;height:9px;background:#b08a44;transform:rotate(45deg);top:6px;right:6px\"><\u002Fspan>\n                <span style=\"position:absolute;width:9px;height:9px;background:#b08a44;transform:rotate(45deg);bottom:6px;left:6px\"><\u002Fspan>\n                <span style=\"position:absolute;width:9px;height:9px;background:#b08a44;transform:rotate(45deg);bottom:6px;right:6px\"><\u002Fspan>\n                <div style=\"flex:1;border:1px solid #b08a44;display:flex;flex-direction:column;align-items:center;text-align:center;padding:10mm 20mm 15mm;justify-content:space-between\">\n\n                  <div style=\"display:flex;flex-direction:column;align-items:center;gap:6mm\">\n                    <img src=\"ead4e0dd-438c-4962-a96c-09392842b694\" alt=\"Asia Pacific Vascular Summit\" style=\"height:26mm;width:auto;object-fit:contain\">\n                    <div style=\"display:flex;align-items:center;gap:14px;justify-content:center\">\n                      <span style=\"display:block;width:46px;height:1px;background:#b08a44\"><\u002Fspan>\n                      <span style=\"font-size:13px;letter-spacing:3.5px;color:#103a48;text-transform:uppercase;white-space:nowrap\">The 6th Asia Pacific Vascular Summit<\u002Fspan>\n                      <span style=\"display:block;width:46px;height:1px;background:#b08a44\"><\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"font-style:italic;font-size:14px;color:#6f6557;letter-spacing:0.3px;margin-top:-3mm\">in conjunction with the Asia Pacific Angiology Academic Alliance<\u002Fdiv>\n                    <div style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:42px;line-height:1;letter-spacing:0.5px;color:#103a48\">Certificate of Attendance<\u002Fdiv>\n                  <\u002Fdiv>\n\n                  <div style=\"display:flex;flex-direction:column;align-items:center;gap:5mm;max-width:235mm;margin-top:7mm\">\n                    <div style=\"font-style:italic;font-size:17px;color:#6f6557\">This is to certify that<\u002Fdiv>\n                    <div style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:{{ att.nameSize }}px;line-height:1.1;color:#103a48;border-bottom:1px solid #b08a44;padding:0 12mm 4mm;min-width:120mm;white-space:nowrap;box-sizing:border-box\">{{ att.name }}<\u002Fdiv>\n                    <div style=\"font-size:17px;line-height:1.75;color:#3f4b50;max-width:240mm;white-space:nowrap\">attended and contributed to <span style=\"font-weight:500;color:#103a48\">The 6th Asia Pacific Vascular Summit<\u002Fspan>, held on 3–4 July 2026 at Four Points by Sheraton,<br>Bintan, Indonesia, {{ att.role }}.<\u002Fdiv>\n                    <div style=\"font-style:italic;font-size:15px;color:#b08a44;letter-spacing:0.3px\">“Where Innovation Meets Clinical Acumen in Vascular Surgery”<\u002Fdiv>\n                  <\u002Fdiv>\n\n                  <div style=\"display:flex;flex-direction:column;align-items:center;gap:6mm;width:100%\">\n                    <div style=\"display:flex;justify-content:space-between;gap:8mm;width:100%;max-width:235mm\">\n                      <div style=\"display:flex;flex-direction:column;align-items:center;flex:1;padding-top:21mm;position:relative\">\n                        <img src=\"d0f3b46d-1eba-4728-8d95-caf3b9416470\" alt=\"Signature of Dr Benjamin Chua\" style=\"position:absolute;left:50%;transform:translateX(-50%);top:3mm;height:19mm;width:auto;object-fit:contain;pointer-events:none\">\n                        <div style=\"width:100%;border-top:1px solid #103a48;padding-top:2.5mm\"><\u002Fdiv>\n                        <div style=\"font-size:12px;letter-spacing:0.8px;color:#103a48;text-transform:uppercase;font-weight:500\">Dr Benjamin Chua<\u002Fdiv>\n                        <div style=\"font-size:11px;color:#8a8273;margin-top:1mm\">Organising Committee<\u002Fdiv>\n                      <\u002Fdiv>\n                      <div style=\"display:flex;flex-direction:column;align-items:center;flex:1;padding-top:21mm\">\n                        <div style=\"width:100%;border-top:1px solid #103a48;padding-top:2.5mm\"><\u002Fdiv>\n                        <div style=\"font-size:12px;letter-spacing:0.8px;color:#103a48;text-transform:uppercase;font-weight:500\">A/Prof Ch’ng Jack Kian<\u002Fdiv>\n                        <div style=\"font-size:11px;color:#8a8273;margin-top:1mm\">Organising Committee<\u002Fdiv>\n                      <\u002Fdiv>\n                      <div style=\"display:flex;flex-direction:column;align-items:center;flex:1;padding-top:21mm\">\n                        <div style=\"width:100%;border-top:1px solid #103a48;padding-top:2.5mm\"><\u002Fdiv>\n                        <div style=\"font-size:12px;letter-spacing:0.8px;color:#103a48;text-transform:uppercase;font-weight:500\">Prof. Jimmy Tan Wei-Hwa<\u002Fdiv>\n                        <div style=\"font-size:11px;color:#8a8273;margin-top:1mm\">Organising Committee<\u002Fdiv>\n                      <\u002Fdiv>\n                      <div style=\"display:flex;flex-direction:column;align-items:center;flex:1;padding-top:21mm;position:relative\">\n                        <img src=\"99d61fbf-9089-4914-9e7e-f85d21096c71\" alt=\"Signature of Prof. Zheng Yuehong\" style=\"position:absolute;left:50%;transform:translateX(-50%);top:8mm;height:15mm;width:auto;object-fit:contain;mix-blend-mode:multiply;pointer-events:none\">\n                        <div style=\"width:100%;border-top:1px solid #103a48;padding-top:2.5mm\"><\u002Fdiv>\n                        <div style=\"font-size:12px;letter-spacing:0.8px;color:#103a48;text-transform:uppercase;font-weight:500\">Prof. Zheng Yuehong<\u002Fdiv>\n                        <div style=\"font-size:11px;color:#8a8273;margin-top:1mm\">Organising Committee<\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;defaultRole&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Delegate&quot;,&quot;options&quot;:[&quot;Delegate&quot;,&quot;Speaker&quot;,&quot;Faculty&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Defaults&quot;}}\">\nclass Component extends DCLogic {\n  STORAGE_KEY = 'apvs2026_attendees';\n\n  DEFAULT_LIST = `Dr Benjamin Chua, Faculty\nA/Professor Ch'ng Jack Kian, Faculty\nProfessor Jimmy Tan Wei-Hwa, Faculty\nProfessor Zheng Yuehong, Faculty\nDr Chen Min Qi, Faculty\nDr Darius Aw Kang Lie, Faculty\nDr Feng Jiajun, Faculty\nDr Kalpana Vijakumar, Faculty\nDr Lai Boon Cheok, Faculty\nDr Nick Ng Zhi Peng, Faculty\nAPN Sivagame Maniya, Faculty\nProfessor Tay Kiang Hiong, Faculty\nDr Teo Qi Tian, Faculty\nDr Zoe Tan Zhuo Xuan, Faculty\nA/Professor Kong Xiangqian, Faculty\nDr Liu Cheng, Faculty\nDr Meng Luxi, Faculty\nDr Song Xiao Hong, Faculty\nDr Yan Sheng, Faculty\nDr Zhang Lei, Faculty\nProfessor Liu Bao, Faculty\nProfessor Liu Xiaobing, Faculty\nProfessor Wang Haofu, Faculty\nProfessor Zheng Junmeng, Faculty\nProfessor Zhou Weimin, Faculty\nProfessor Dang Yongkang, Faculty\nProfessor Ren Buyuan, Faculty\nDr Chan Kwong Shun, Faculty\nDr Tse Cheuk Wa, Faculty\nDr Adisaputra Ramadhinara, Faculty\nDr Alexander Jayadi Utama, Faculty\nDr Febian Aji Wicaksono, Faculty\nDr Ihza Fachriza, Faculty\nDr Januar Rizky Adriani, Faculty\nDr Muhamed Taufik Ismail, Faculty\nDr Putie Hapsari, Faculty\nDr Raden Suhartono, Faculty\nDr Yosis Yohannes Motulo, Faculty\nProfessor Germano Melissano, Faculty\nA/Professor Naoki Fujimura, Faculty\nDr Shigeo Ichihashi, Faculty\nDr Toshio Takayama, Faculty\nA/Professor Joh Jin Hyun, Faculty\nA/Professor Sanghyun Ahn, Faculty\nProfessor Kim Hyangkyoung, Faculty\nProfessor Kim Jang Yong, Faculty\nDatuk Benjamin Leong Dak Keung, Faculty\nDr Ahmad Rafizi Hariz bin Ramli, Faculty\nDr Tan Kia Lean, Faculty\nA/Professor Manar Khashram, Faculty\nDr Leoncio Kaw, Faculty\nDr Ricardo Torre Quintos, Faculty\nDr Tan Yu Hern, Faculty\nDr Wen Hao, Faculty\nDr Chaipak Techapetpaiboon, Faculty\nDr Krit Wangkeeratikarn, Faculty\nDr Saritphat Orrapin, Faculty\nA/Professor Do Kim Que, Faculty\nA/Professor Phan Quoc Hung, Faculty\nDr Loi Hoang Minh, Faculty\nDr Nguyen Luan Dinh, Faculty\nDr Nguyen Tung Son, Faculty\nDr Phan Anh Khoa, Faculty\nDr Tung Minh Ly, Faculty\nLeong Wei Lin, Participant\nNicole Sim Leng, Participant\nHu Lianxue, Participant\nJoanne Tan Sze Eng, Participant\nLeong Kam Wei, Participant\nKhoo Pei Fong, Participant\nLaura Chong Min, Participant\nNurul Nazhirin Binte Ahmad Nizam, Participant\nTsai Fu-Chieh, Participant\nDr Jonathan Cheng, Participant\nDr Irene Wong, Participant\nDr Marjorie Hoang, Participant\nGuo Lihai, Participant\nChen Yanhui, Participant\nZheng Yi, Participant\nLi Dandan, Participant\nZhang Xiaohong, Participant\nZhang Hua, Participant\nDing Zhaoying, Participant\nDr Syarifudin Anshari, Participant\nDr Mursid Fadli, Participant\nDr Tommy Kuswara, Participant\nDr Andi Hakim, Participant\nDr Benni Sinaga, Participant\nDr April Hidayat, Participant\nNguyen Bao San, Participant\nMuhammad Hafid Fadilah, Participant\nFennatika Salim, Participant\nSuib Bin Ismail, Participant\nSiti Zaiton Binti Abu, Participant\nAhmad Firdaus Bin Ahman Lutfi, Participant\nDr Anne Saputra, Participant\nDr Nik Ahmad Amru Bin Nik Mazlan, Participant\nKit Jie Fei, Participant\nConstance Thoi Li Gek, Participant\nAudrey Tsan, Participant\nListiana Rachmawati, Participant\nLidya Sare, Participant\nJessie Chan, Participant\nAndrea Leong, Participant\nMelissa Lim, Participant\nKanisorn Chaichitaton, Participant\nAgnes Quek, Participant`;\n\n  state = {\n    raw: (typeof localStorage !== 'undefined' && localStorage.getItem('apvs2026_attendees')) || '',\n    index: 0,\n    printAll: false,\n  };\n\n  componentDidMount() {\n    if (!this.state.raw) {\n      try { localStorage.setItem(this.STORAGE_KEY, this.DEFAULT_LIST); } catch (_) {}\n      this.setState({ raw: this.DEFAULT_LIST });\n    }\n    this._fit = () => this.fit();\n    window.addEventListener('resize', this._fit);\n    this.fit();\n    if (document.fonts && document.fonts.ready) {\n      document.fonts.ready.then(() => { this._fontsReady = true; this.forceUpdate(); this.fit(); });\n    }\n    window.addEventListener('afterprint', () => {\n      if (this.state.printAll) this.setState({ printAll: false });\n    });\n  }\n\n  componentDidUpdate() { this.fit(); }\n  componentWillUnmount() { window.removeEventListener('resize', this._fit); }\n\n  fit() {\n    const outer = this._stage, scaler = this._scaler;\n    if (!outer || !scaler) return;\n    const W = 1122.5, H = 793.7;\n    const avail = outer.clientWidth;\n    const s = Math.min(avail / W, 1);\n    scaler.style.transform = 'scale(' + s + ')';\n    outer.style.height = (H * s) + 'px';\n  }\n\n  nameSize(name) {\n    if (!this._mctx) this._mctx = document.createElement('canvas').getContext('2d');\n    const ctx = this._mctx;\n    ctx.font = '600 100px \"Cormorant Garamond\", Georgia, serif';\n    const w100 = ctx.measureText(name).width || 1;\n    const PADDING = 91;       // 12mm side padding x2 in px\n    const MAXBOX = 880;       // matches name box budget\n    const avail = MAXBOX - PADDING;\n    let size = Math.floor(avail / (w100 / 100));\n    return Math.max(26, Math.min(54, size));\n  }\n\n  titleCase(s) {\n    return s.replace(/\\w[^\\s/-]*/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());\n  }\n\n  phrase(roleRaw) {\n    const r = (roleRaw || '').trim();\n    const def = this.props.defaultRole ?? 'Delegate';\n    const role = r ? this.titleCase(r) : def;\n    if (/^faculty$/i.test(role)) return { label: role, text: 'as Faculty' };\n    if (/^(an|invited)/i.test(role)) return { label: role, text: 'as an ' + role };\n    return { label: role, text: 'as a ' + role };\n  }\n\n  parse() {\n    return this.state.raw.split('\\n')\n      .map(l => l.trim())\n      .filter(Boolean)\n      .map(line => {\n        const ci = line.indexOf(',');\n        const name = ci === -1 ? line : line.slice(0, ci).trim();\n        const roleRaw = ci === -1 ? '' : line.slice(ci + 1).trim();\n        const p = this.phrase(roleRaw);\n        return { name, role: p.text, roleLabel: p.label, nameSize: this.nameSize(name) };\n      });\n  }\n\n  renderVals() {\n    const attendees = this.parse();\n    const total = attendees.length;\n    const index = total ? Math.max(0, Math.min(this.state.index, total - 1)) : 0;\n    const fallback = { name: 'Attendee Name', role: this.phrase('').text, roleLabel: this.props.defaultRole ?? 'Delegate', nameSize: 54 };\n    const current = total ? attendees[index] : fallback;\n    const displayList = this.state.printAll ? attendees : [current];\n    const options = attendees.map((a, i) => ({ i, label: (i + 1) + '.  ' + a.name + '  \\u00b7  ' + a.roleLabel }));\n\n    return {\n      raw: this.state.raw,\n      displayList,\n      options,\n      total,\n      index,\n      position: total ? index + 1 : 0,\n      modeClass: this.state.printAll ? 'mode-all' : 'mode-one',\n      onRaw: (e) => {\n        const v = e.target.value;\n        try { localStorage.setItem(this.STORAGE_KEY, v); } catch (_) {}\n        this.setState({ raw: v });\n      },\n      downloadList: () => {\n        const blob = new Blob([this.state.raw], { type: 'text/plain' });\n        const url = URL.createObjectURL(blob);\n        const a = document.createElement('a');\n        a.href = url;\n        a.download = 'APVS-2026-attendees.txt';\n        a.click();\n        setTimeout(() => URL.revokeObjectURL(url), 1000);\n      },\n      onJump: (e) => this.setState({ index: parseInt(e.target.value, 10) || 0 }),\n      prev: () => this.setState(s => ({ index: Math.max(0, s.index - 1) })),\n      next: () => this.setState(s => ({ index: Math.min(Math.max(0, total - 1), s.index + 1) })),\n      printOne: () => { this.setState({ printAll: false }, () => setTimeout(() => window.print(), 80)); },\n      printAll: () => {\n        if (!total) return;\n        this.setState({ printAll: true }, () => setTimeout(() => window.print(), 1000));\n      },\n      stageRef: (el) => { this._stage = el; this.fit(); },\n      scalerRef: (el) => { this._scaler = el; this.fit(); },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
